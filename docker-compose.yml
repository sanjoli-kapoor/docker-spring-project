version: "3"

services:
  redis:
    container_name: "redis"
    image: redis
    ports:
      - 6379:6379
  db:
    image: mysql:8.1
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: springpass
      MYSQL_DATABASE: project_people
    ports:
      - 3306:3306
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pspringpass"]
      interval: 10s
      timeout: 5s
      retries: 5
  app:
    container_name: "app"
    image: docker-spring
    ports:
      - 8080:8080
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started


networks:
 bridge:
   driver: bridge