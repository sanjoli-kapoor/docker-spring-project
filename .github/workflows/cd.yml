name: CD - Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build JAR
        run: ./mvnw clean package -DskipTests

      - name: Stop existing containers
        run: docker-compose down || true

      - name: Remove old image
        run: docker rmi docker-spring || true

      - name: Build Docker image
        run: docker build -t docker-spring .

      - name: Start containers
        run: docker-compose up -d

      - name: Verify app is ready to serve traffic
        run: |
          echo "Waiting for app to report UP..."
          for i in $(seq 1 12); do
            HEALTH=$(curl -s --max-time 5 http://localhost:8080/actuator/health || true)
            if echo "$HEALTH" | grep -q '"status":"UP"'; then
              echo "App is UP and ready."
              exit 0
            fi
            echo "Attempt $i/12 — retrying in 5s..."
            sleep 5
          done
          echo "App did not become healthy in time."
          docker-compose logs app
          exit 1
